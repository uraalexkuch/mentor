<div class="auth-page">
  <div class="auth-left">
    <div class="brand-content animate-fade-in">
      <img _ngcontent-ng-c945110208="" src="assets/images/logosvg.svg" alt="ДЦЗ" class="logo">
      <h1 class="system-name">Єдина інформаційна система<br>менторського проєкту</h1>
      <p class="description">Панель адміністратора для управління програмами менторства та консультацій.</p>
    </div>
    <div class="auth-footer">&copy; 2026 Державна служба зайнятості. Всі права захищені.</div>
  </div>
  
  <div class="auth-right">
    <div class="login-card shadow-lg animate-slide-up">
      <div class="card-header">
        <h2 class="card-title">Авторизація</h2>
        <p class="card-subtitle">Введіть ваші робочі облікові дані</p>
      </div>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email" class="form-label">Email або Логін</label>
          <div class="input-wrapper">
            <input 
              id="email"
              type="text" 
              formControlName="email" 
              class="form-input"
              placeholder="name@dcz.gov.ua або логін"
            />
            <span class="input-icon">person</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Пароль</label>
          <div class="input-wrapper">
            <input 
              id="password"
              type="password" 
              formControlName="password"
              class="form-input"
              placeholder="введіть пароль"
            />
            <span class="input-icon">lock</span>
          </div>
        </div>

        <div class="server-error" *ngIf="errorMessage">
          <span class="error-icon">⚠</span>
          <span>{{ errorMessage }}</span>
        </div>

        <button 
          type="submit" 
          class="submit-btn" 
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="!isLoading">Увійти в систему</span>
          <span *ngIf="isLoading">Авторизація...</span>
        </button>
      </form>
    </div>
  </div>
</div>
